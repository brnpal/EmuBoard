<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmuBoard</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/emu_avatar.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

</head>
<body>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="logo-container">
      <div class="logo">EmuBoard</div>
      <img src="assets/emu_avatar.png" alt="Emu Mascot" class="logo-avatar" />
    </div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Systems</a></li>
      <li><a href="#">Favorites</a></li>
    </ul>
  </nav>

  <!-- Hero Section -->
  <header class="hero" id="hero">
    <div class="hero-content">
      <h1 class="hero-title">STAR EXPLORER</h1>
      <div class="hero-meta">
        <span class="tag">SNES</span>
        <span class="tag">RPG</span>
        <span>1994</span>
      </div>
      <p class="hero-desc">
        Embark on a grand sci-fi adventure across the cosmos. Master the elements, 
        upgrade your ship, and battle the alien empire in this classic 16-bit masterpiece.
      </p>
      <div class="hero-buttons">
        <button class="btn btn-primary" onclick="playMockGame()">
          <!-- SVG Play Icon -->
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Play Now
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content Carousels -->
  <main class="main-content">
    
    <section class="carousel-section">
      <h2 class="carousel-title">Recently Played</h2>
      <div class="carousel-wrapper">
        <div class="carousel-container" id="carousel-recent">
          <!-- Injected via JS -->
        </div>
        <button class="scroll-arrow right-arrow" id="scroll-right-recent">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
      </div>
    </section>

    <section class="grid-section">
      <h2 class="grid-title">A-Z</h2>
      <div class="grid-container" id="grid-az">
        <!-- Injected via JS -->
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
